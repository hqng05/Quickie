# ═══════════════════════════════════════════════════════════════
# Quickie — Configuration
# ═══════════════════════════════════════════════════════════════

enable-prefix: true
prefix: "<gradient:#E43A96:#FFFFFF>ꞯᴜɪᴄᴋɪᴇ</gradient>"

# ────── Database Section ─────────────────────────────────────
database:
  type: "sqlite" # Supported type: sqlite, mysql

  # ───── MySQL Settings ──────────────────────────────────────
  # Only used when database.type is set to "mysql".
  mysql:
    host: localhost
    port: 3306
    database: "quickie_db"
    username: "quickie"
    password: "password"

  # ───── SQLite Settings ─────────────────────────────────────
  # Only used when database.type is set to "sqlite".
  # File is stored relative to the plugin's data folder.
  sqlite:
    file: "quickie.db"

  # ────── HikariCP Connection Pool ─────────────────────────────────────
  # Shared settings for both MySQL and SQLite.
  # SQLite ignores maximum-pool-size and minimum-idle (forced to 1).
  hikari:
    maximum-pool-size: 10
    minimum-idle: 2
    connection-timeout: 30000
    idle-timeout: 600000
    max-lifetime: 1800000

economy:
  # Starting balance for newly created accounts. BigDecimal string, 2 decimal places.
  starting-balance: "100.00"
  # Currency names used by the Vault provider when formatting money.
  # singular is used when the amount equals 1, plural otherwise.
  currency:
    singular: "coin"
    plural: "coins"
  # Decimal places shown when formatting money (display only; does NOT affect stored precision).
  fractional-digits: 2

metrics:
  enabled: true