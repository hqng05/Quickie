# Quickie message templates — MiniMessage syntax ONLY.
# Legacy color codes (&a, §a, etc.) are intentionally NOT supported and will show as
# raw text. Use MiniMessage tags instead: <red>, <gold>, <bold>, <gradient:...>, etc.
#
# List messages use an indexed-key convention: declare the same key prefix with a
# zero-based ".N" suffix on each line. They are returned in numeric order by
# getMessageList("<prefix>"). Example:
#   help.line.0=...
#   help.line.1=...
#   help.line.2=...

prefix=<gradient:#E43A96:#FFFFFF>ꞯᴜɪᴄᴋɪᴇ</gradient> <gray>»</gray>

general.reload-success=<green>Configuration reloaded.
general.unknown-command=<red>Unknown command.

error.no-permission=<red>You do not have permission to use this command.
error.player-only=<red>This command can only be used by a player.
error.generic=<red>An unexpected error occurred. Please contact an administrator.

help.header=<bold>Quickie commands:</bold>
help.line.0=<yellow>/home set <name></yellow> <gray>-</gray> set a home
help.line.1=<yellow>/home tp <name></yellow> <gray>-</gray> teleport to a home
help.line.2=<yellow>/warp <name></yellow> <gray>-</gray> teleport to a warp

economy.balance=<green>Your balance: <gold><balance>
economy.insufficient=<red>You do not have enough money.
economy.deposited=<green>Deposited <gold><amount><green>. New balance: <gold><balance>
economy.withdrawn=<green>Withdrew <gold><amount><green>. New balance: <gold><balance>
